services:
  # 🏰 POCKETBASE CORE (Backend Only)
  pocketbase:
    build:
      context: .
      dockerfile: services/pocketbase/Dockerfile
    container_name: pocketcoder-pocketbase
    ports:
      - "8090:8090" # PocketBase UI
    volumes:
      - pb_data:/app/pb_data
      # - pb_backups:/app/pb_backups
      - pocketcoder-logs:/app/pb_public/logs
      - opencode_workspace:/workspace
      - ./services/opencode:/workspace/.opencode
      - ./services/mcp-gateway/config:/mcp_config
      - llm_keys:/llm_keys
    environment:
      - POCKETBASE_SUPERUSER_EMAIL=${POCKETBASE_SUPERUSER_EMAIL}
      - POCKETBASE_SUPERUSER_PASSWORD=${POCKETBASE_SUPERUSER_PASSWORD}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - AGENT_EMAIL=${AGENT_EMAIL}
      - AGENT_PASSWORD=${AGENT_PASSWORD}
      - PN_PROVIDER=${PN_PROVIDER}
      - PN_URL=${PN_URL}
      - PN_RELAY_SECRET=${PN_RELAY_SECRET}
      - DOCKER_HOST=tcp://docker-socket-proxy-write:2375
      - OPENCODE_URL=http://opencode:3000
    command: ["/app/pocketbase", "serve", "--http=0.0.0.0:8090"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - pocketcoder-dashboard
      - pocketcoder-docker
      - pocketcoder-pocketbase-sdk
      - pocketcoder-opencode-sdk

  # 🧠 OPENCODE (Reasoning Engine)
  opencode:
    build:
      context: .
      dockerfile: services/opencode/Dockerfile
    container_name: pocketcoder-opencode
    depends_on:
      sandbox:
        condition: service_healthy
    environment:
      - PORT=3000
      - PROXY_URL=http://sandbox:3001
      - SHELL=/usr/local/bin/pocketcoder-shell
      - AGENT_EMAIL=${AGENT_EMAIL}
      - AGENT_PASSWORD=${AGENT_PASSWORD}
    working_dir: /workspace
    user: root
    volumes:
      - opencode_workspace:/workspace
      - ./services/opencode:/workspace/.opencode
      - opencode_data:/root/.local/share/opencode
      - ./services/opencode/opencode.json:/root/.config/opencode/opencode.json:ro
      - ./services/mcp-gateway/config:/mcp_config:ro
      - shell_bridge:/shell_bridge
    command: serve --port 3000 --hostname 0.0.0.0 --log-level DEBUG
    healthcheck:
      test: ["CMD", "/bin/ash", "-c", "curl -f http://localhost:3000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - pocketcoder-opencode-sdk
      - pocketcoder-control
      - pocketcoder-knowledge

  # 🔨 SANDBOX (Isolated Execution Environment)
  sandbox:
    build:
      context: .
      dockerfile: services/sandbox/Dockerfile
    container_name: pocketcoder-sandbox
    ports:
      - "2222:2222"  # SSH + SFTP (key-auth only)
    volumes:
      - opencode_workspace:/workspace
      - ./services/sandbox/opencode.json:/root/.config/opencode/opencode.json:ro
      - shell_bridge:/app/shell_bridge
      - ./scripts/debug:/workspace/debug
      - llm_keys:/llm_keys:ro
    working_dir: /workspace
    environment:
      - TMUX_TMPDIR=/tmp/tmux
      - TMUX_SOCKET=/tmp/tmux/pocketcoder
      - MCP_HOST=http://mcp-gateway:8811/sse
      - OPENCODE_URL=http://opencode:3000
      - DOCKER_MCP_IN_CONTAINER=1
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "curl -f http://localhost:3001/health && curl -f http://localhost:9888/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pocketcoder-control
      - pocketcoder-tools


  # 🔌 MCP GATEWAY (MCP Server Gateway)
  mcp-gateway:
    build:
      context: .
      dockerfile: services/mcp-gateway/Dockerfile
    container_name: pocketcoder-mcp-gateway
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/mcp-gateway/config:/root/.docker/mcp
    environment:
      - DOCKER_MCP_IN_CONTAINER=1
      - LINODE_TOKEN=${LINODE_TOKEN}
      - ENABLE_TF_OPERATIONS=${ENABLE_TF_OPERATIONS}
      - TFE_TOKEN=${TFE_TOKEN}
      - DOCKER_MCP_TELEMETRY_DEBUG=1
    command: ["--port", "8811", "--transport", "sse", "--verbose", "--log-calls", "--log", "/var/log/mcp-gateway.log", "--catalog", "/root/.docker/mcp/docker-mcp.yaml", "--secrets", "/root/.docker/mcp/mcp.env", "--enable-all-servers"]
    networks:
      - pocketcoder-docker
      - pocketcoder-tools
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8811/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s

  # 🔒 DOCKER SOCKET PROXY - WRITE (Security Layer for PocketBase)
  # Currently shared by both PocketBase (restart) and Dozzle (logs)
  # For production: uncomment docker-socket-proxy-read below and update Dozzle config
  docker-socket-proxy-write:
    image: tecnativa/docker-socket-proxy:latest
    container_name: pocketcoder-docker-proxy-write
    environment:
      # Enable container operations for PocketBase restart capability
      - CONTAINERS=1          # Allow container operations (list, inspect, restart)
      - POST=1                # Allow POST requests (for restart)
      - EVENTS=1              # Allow streaming events (for Dozzle)
      - INFO=1                # Required for Dozzle to detect Docker version
      - IMAGES=0              # Disable image operations
      - NETWORKS=0            # Disable network operations
      - VOLUMES=0             # Disable volume operations
      - BUILD=0               # Disable build operations
      - COMMIT=0              # Disable commit operations
      - CONFIGS=0             # Disable config operations
      - DISTRIBUTION=0        # Disable distribution operations
      - EXEC=0                # Disable exec operations
      - PLUGINS=0             # Disable plugin operations
      - SECRETS=0             # Disable secrets operations
      - SERVICES=0            # Disable services operations
      - SESSION=0             # Disable session operations
      - SWARM=0               # Disable swarm operations
      - SYSTEM=0              # Disable system operations
      - TASKS=0               # Disable tasks operations
      - LOG_LEVEL=info        # Logging level
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pocketcoder-docker
    restart: unless-stopped

  # 🛰️ SOVEREIGN INTERFACE (Linear Bridge)
  interface:
    build:
      context: services/interface
      dockerfile: Dockerfile
    container_name: pocketcoder-interface
    depends_on:
      pocketbase:
        condition: service_healthy
      opencode:
        condition: service_healthy
    environment:
      - POCKETBASE_URL=http://pocketbase:8090
      - OPENCODE_URL=http://opencode:3000
      - AGENT_EMAIL=${AGENT_EMAIL}
      - AGENT_PASSWORD=${AGENT_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pocketcoder-opencode-sdk
      - pocketcoder-pocketbase-sdk
    restart: unless-stopped

  # 📈 SQLPAGE (SQLite Dashboard)
  sqlpage:
    image: lovasoa/sqlpage:latest
    user: root
    container_name: pocketcoder-sqlpage
    environment:
      - SQLPAGE_ENVIRONMENT=development
      - SQLPAGE_SITE_PREFIX=/api/pocketcoder/proxy/observability/
    volumes:
      - pb_data:/database/pocketbase           # PocketBase DB (operational)
      - opencode_data:/database/opencode       # OpenCode DB (analytics)
      - ./services/sqlpage/dashboard:/var/www:ro                  # SQLPage queries/dashboards
      - ./services/sqlpage/config:/etc/sqlpage:ro       # Configuration (sqlpage.json, on_connect.sql)
    networks:
      - pocketcoder-dashboard
    restart: unless-stopped
    depends_on:
      - pocketbase
      - opencode
      - sandbox


  # 📚 SURREALDB (Knowledge + Memory Database)
  # To enable: docker compose --profile knowledge up
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: pocketcoder-surrealdb
    user: root
    profiles:
      - knowledge
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    volumes:
      - surrealdb_data:/mydata
    networks:
      - pocketcoder-knowledge
    restart: unless-stopped

  # 📓 OPEN NOTEBOOK (Knowledge Base — NotebookLM Alternative)
  # To enable: docker compose --profile knowledge up
  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: pocketcoder-open-notebook
    profiles:
      - knowledge
    depends_on:
      - surrealdb
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}
    volumes:
      - notebook_data:/app/data
    ports:
      - "8502:8502"  # OpenNotebook UI
      - "5055:5055"  # OpenNotebook REST API
    networks:
      - pocketcoder-knowledge
    restart: unless-stopped

  # 🔗 OPEN NOTEBOOK MCP (MCP Bridge for OpenCode)
  # To enable: docker compose --profile knowledge up
  open-notebook-mcp:
    build:
      context: services/open-notebook-mcp
      dockerfile: Dockerfile
    container_name: pocketcoder-open-notebook-mcp
    profiles:
      - knowledge
    depends_on:
      - open-notebook
    environment:
      - OPEN_NOTEBOOK_URL=http://open-notebook:5055
      - MCP_TRANSPORT=streamable-http
      - HOST=0.0.0.0
      - PORT=8000
    networks:
      - pocketcoder-knowledge
    restart: unless-stopped

  # 🧠 POCO-MEMORY (Agent Memory MCP Server)
  # To enable: docker compose --profile knowledge up
  poco-memory:
    build:
      context: services/poco-memory
      dockerfile: Dockerfile
    container_name: pocketcoder-poco-memory
    profiles:
      - knowledge
    depends_on:
      - surrealdb
    environment:
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=poco_memory
      - SURREAL_DATABASE=poco_memory
      - HOST=0.0.0.0
      - PORT=8001
    volumes:
      - fastembed_cache:/root/.cache/fastembed
    networks:
      - pocketcoder-knowledge
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  # 🔔 NTFY (Optional Sovereign Notification Server)
  # To enable: docker compose --profile foss up
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: pocketcoder-ntfy
    profiles:
      - foss
    command: serve
    environment:
      - TZ=UTC
      - NTFY_BASE_URL=${PN_URL} # Should be your domain or local IP
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all # Sovereign Privacy: Default to private
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-auth:/var/lib/ntfy
    ports:
      - "2586:80"
    networks:
      - pocketcoder-pocketbase-sdk
    restart: unless-stopped

volumes:
  pb_data:
  # pb_backups:
  #   external: true
  #   name: pocketcoder_pb_backups
  pocketcoder-logs:
  opencode_workspace:
  opencode_data:
  llm_keys:  # Shared LLM API keys (env file written by PocketBase, read by sandbox)
  shell_bridge:
  ntfy-cache:
  ntfy-auth:
  surrealdb_data:
  notebook_data:
  fastembed_cache:  # ONNX model cache for poco-memory embeddings

networks:
  pocketcoder-dashboard:
    driver: bridge
  pocketcoder-control:
    driver: bridge
  pocketcoder-docker:
    driver: bridge
  pocketcoder-tools:
    driver: bridge
  pocketcoder-opencode-sdk:
    driver: bridge
  pocketcoder-pocketbase-sdk:
    driver: bridge
  pocketcoder-knowledge:
    driver: bridge