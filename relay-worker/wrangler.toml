name = "pocketcoder-relay"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
FCM_PROJECT_ID = "pocketcoder"
DAILY_PUSH_LIMIT = "1000"

# Secrets (set via `wrangler secret put`):
# PN_RELAY_SECRET       — shared secret with PocketBase
# REVENUECAT_SECRET_KEY — RevenueCat V2 secret API key
# FCM_CLIENT_EMAIL      — from Firebase service account JSON
# FCM_PRIVATE_KEY       — base64 of service account private_key PEM
# SUPABASE_URL          — e.g. https://xxx.supabase.co
# SUPABASE_SERVICE_KEY  — Supabase service_role key
