name: app
resolution: workspace
description: "Proprietary implementations and third-party integrations for PocketCoder."
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  pocketcoder_flutter:
    path: ../pocketcoder_flutter
  equatable: ^2.0.5
  flutter_dotenv: ^5.1.0
  get_it: ^7.6.4
  injectable: ^2.3.2
  go_router: ^14.0.0
  flutter_bloc: ^8.1.3
  cubit_ui_flow:
    git:
      url: git@github.com:qtpi-bonding-org/flutter_cubit_ui_flow.git
      ref: 737f24b
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_aeroform:
    git:
      url: git@github-qtpi-bonding-org-flutter_aeroform:qtpi-bonding-org/flutter_aeroform.git
      ref: 4ec5786
  http: ^1.2.0
  flutter_secure_storage: ^10.0.0

  # Proprietary SDKs (Gated here)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  purchases_flutter: ^7.0.0

dev_dependencies:
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
